name: keep-alive

# Pings the Render app's public health endpoint so the free instance never idles
# into a cold start. /api/health is exempt from the login gate, so no auth needed.
# Free & unlimited on public repos. GitHub may delay scheduled runs under load;
# */5 leaves margin against Render's ~15-min sleep. Trigger manually anytime via
# the Actions tab (workflow_dispatch).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/health (wakes the instance if asleep)
        run: |
          curl -sS --fail \
            --max-time 90 --retry 4 --retry-delay 15 --retry-all-errors \
            https://navinryan-app.onrender.com/api/health \
          && echo "" && echo "pinged OK" \
          || echo "ping did not succeed this round (will retry next schedule)"
